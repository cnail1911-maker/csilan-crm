<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#6C5CE7;--brand2:#A29BFE;--brand-dark:#4834d4;
  --accent:#00CEC9;--accent2:#55EFC4;
  --warn:#FDCB6E;--danger:#FF7675;--success:#00B894;
  --main:#0f0c24;--surface:rgba(255,255,255,0.05);--surface2:rgba(255,255,255,0.08);
  --text:#F0EEFF;--text2:rgba(240,238,255,0.6);--text3:rgba(240,238,255,0.35);
  --border:rgba(255,255,255,0.1);
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--main);color:var(--text);font-size:13px}

/* AUTH */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--main);position:relative;overflow:hidden}
#auth-screen::before{content:'';position:absolute;top:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(108,92,231,0.3),transparent 70%);pointer-events:none}
#auth-screen::after{content:'';position:absolute;bottom:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,206,201,0.2),transparent 70%);pointer-events:none}
.auth-card{background:#1a1240;border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:380px;position:relative;z-index:1}
.auth-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(90deg,#fff,var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--text3);margin-bottom:28px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.auth-field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;outline:none;transition:border-color 0.2s}
.auth-field input:focus{border-color:var(--brand)}
.auth-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:'Be Vietnam Pro',sans-serif;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.auth-btn:hover{opacity:0.9}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{background:rgba(255,118,117,0.1);border:1px solid rgba(255,118,117,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--danger);margin-top:10px;display:none}

/* APP */
#app-screen{display:none;height:100vh}
.app{display:flex;height:100%;overflow:hidden}
.sidebar{width:215px;min-width:215px;background:linear-gradient(160deg,#1a1240 0%,#2d1b69 50%,#1a2a4a 100%);display:flex;flex-direction:column;position:relative;overflow:hidden}
.sidebar::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(108,92,231,0.4),transparent 70%);pointer-events:none}
.logo-wrap{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(90deg,#fff,var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.nav-sec{padding:16px 18px 6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:var(--text2);font-size:13px;position:relative;transition:all 0.2s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:#fff;background:rgba(108,92,231,0.25)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--brand),var(--accent));border-radius:0 2px 2px 0}
.nav-item i{font-size:16px;width:18px;text-align:center}
.user-area{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:color 0.2s}
.logout-btn:hover{color:var(--danger)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:12px 22px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;flex:1}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 12px;width:240px;transition:border-color 0.2s}
.search-wrap:focus-within{border-color:var(--brand)}
.search-wrap input{background:transparent;border:none;outline:none;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;width:100%}
.search-wrap input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;transition:all 0.15s;font-weight:500}
.btn:hover{background:var(--surface2)}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-color:transparent;color:#fff;font-weight:600}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,92,231,0.4)}
.content{flex:1;overflow:auto;padding:18px 22px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;border:1px solid var(--border)}
.sc0{background:linear-gradient(135deg,rgba(108,92,231,0.3),rgba(108,92,231,0.1))}
.sc1{background:linear-gradient(135deg,rgba(0,206,201,0.25),rgba(0,206,201,0.08))}
.sc2{background:linear-gradient(135deg,rgba(0,184,148,0.3),rgba(0,184,148,0.1))}
.sc3{background:linear-gradient(135deg,rgba(253,203,110,0.25),rgba(253,203,110,0.08))}
.stat-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.3}
.stat-label{font-size:10px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02)}
.panel-header h2{font-size:13px;font-weight:600;flex:1}
.fsel{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 8px;border-radius:7px;font-family:'Be Vietnam Pro',sans-serif;cursor:pointer;outline:none}
.fsel option{background:#1a1240}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:9px 12px;text-align:left;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.04);cursor:pointer}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-new{background:rgba(162,155,254,0.15);color:var(--brand2);border:1px solid rgba(162,155,254,0.3)}
.b-followup{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}
.b-completed{background:rgba(0,184,148,0.2);color:var(--accent2);border:1px solid rgba(85,239,196,0.35)}
.b-closedeal{background:rgba(0,184,148,0.2);color:var(--accent2);border:1px solid rgba(85,239,196,0.35)}
.b-lost{background:rgba(255,118,117,0.15);color:var(--danger);border:1px solid rgba(255,118,117,0.3)}
.b-invalid{background:rgba(255,118,117,0.1);color:#ffb3b3;border:1px solid rgba(255,118,117,0.2)}
.b-noresponse{background:rgba(116,185,255,0.15);color:#74b9ff;border:1px solid rgba(116,185,255,0.25)}
.b-busy{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}

.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15)}
.av-0{background:linear-gradient(135deg,#6C5CE7,#a29bfe)}
.av-1{background:linear-gradient(135deg,#00cec9,#55efc4)}
.av-2{background:linear-gradient(135deg,#e17055,#fab1a0)}
.av-3{background:linear-gradient(135deg,#0984e3,#74b9ff)}
.av-4{background:linear-gradient(135deg,#fdcb6e,#ffeaa7)}
.av-5{background:linear-gradient(135deg,#00b894,#55efc4)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:#1a1240;border:1px solid var(--border);border-radius:18px;width:580px;max-height:90vh;overflow:auto;box-shadow:0 25px 60px rgba(0,0,0,0.6)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(108,92,231,0.1)}
.modal-header h3{font-size:15px;font-weight:700;flex:1}
.modal-body{padding:18px 20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.field label{font-size:10px;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.field select option{background:#1a1240}
.field textarea{resize:vertical;min-height:64px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.loading-overlay{position:fixed;inset:0;background:rgba(15,12,36,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(108,92,231,0.2);border-top-color:var(--brand);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state i{font-size:48px;margin-bottom:12px;display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.kpi-bar-bg{background:rgba(255,255,255,0.07);border-radius:4px;height:5px;overflow:hidden;margin-top:8px}
.kpi-bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,var(--brand),var(--accent))}
.pipe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.pipe-col{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px}
.pipe-col-hd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pipe-cnt{background:rgba(255,255,255,0.08);border-radius:20px;padding:2px 8px;font-size:10px}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:7px;cursor:pointer;transition:all 0.2s}
.pipe-card:hover{border-color:var(--brand);transform:translateY(-2px)}
.pipe-card-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pipe-card-biz{font-size:10px;color:var(--text3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipe-card-ft{display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}

.deadline-urgent{color:var(--danger);font-weight:600}
.deadline-warn{color:var(--warn);font-weight:600}
.deadline-ok{color:var(--accent2)}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">

<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <span style="font-size:13px;color:var(--text2)">Đang tải...</span>
</div>

<script>
// ============================================================
// DROPDOWN DATA từ template
// ============================================================
const POTENTIAL_OPTS = ['Pedicure Spa & Package','Massage Chair','Furniture','Padset','Heaspa','Part & Accessories'];
const STATUS_OPTS    = ['New','Follow Up','Completed'];
const SUBSTATUS_OPTS = ['New Lead','No Answer','Contacting','Gatekeeper','Qualified','Appointment Set','Quotation Sent','Pending Decision','Follow Up'];
const LEAD_OPTS      = ['Closedeal','Lost','Invalid Lead','No Response','Busy'];
const BRAND_OPTS     = ['TSPA','T4','LEXOR','WHALE SPA','SNS','CONTEGO','NEWSTAR','JNA','AYC','SAM SUPPLY','GULFSTREAM','SNE','TREND NAILS','WHALE SPA','S3 SPA','MR3','OSAKI','ALFAFA','HÃNG KHÁC'];
const TIMES_OPTS     = ['1 year','2 year','3 year','more than 5 year'];
const REASON_OPTS    = ['R1 - Khách chưa có nhu cầu','R2 - Khách bận, không muốn trao đổi','R3 - Franchise không cho mua ngoài','R4 - Đổi nhu cầu / đổi kế hoạch','R5 - Có nhu cầu nhưng rất xa','R6 - Chỉ tham khảo thông tin','R7 - Không muốn tiếp tục nói chuyện','R8 - Giá chưa phù hợp ngân sách','R9 - Đang so sánh với đối thủ','R10 - Ngại mua hàng xa','R11 - Lo ngại lắp đặt / support','R12 - Mới thay nội thất xong','R13 - Chủ đã bán tiệm','R14 - Đang build/setup tiệm','R15 - Chỉ dùng thương hiệu khác','R16 - Sai số, sai thông tin','R17 - Không gặp đúng người quyết định','R18 - Chưa có ngân sách năm nay','R19 - Đang làm với vendor khác','R20 - Khó giao tiếp ngôn ngữ','R21 - Mất liên lạc'];
const STATE_OPTS     = ['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','Washington, D.C.','West Virginia','Wisconsin','Wyoming'];
const AV_CLASSES     = ['av-0','av-1','av-2','av-3','av-4','av-5'];

// ============================================================
// SUPABASE
// ============================================================
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser=null, currentProfile=null, CUSTOMERS=[], PROFILES=[], POTENTIAL_LIST=[];
let page='customers', fStatus='all', fSale='all', fPotential='all', fBrand='all', fRecalled='all', search='', selId=null, addOpen=false;

function daysLeft(dl){if(!dl)return null;return Math.ceil((new Date(dl)-new Date())/(864e5));}
function dlBadge(dl){
  if(!dl)return '<span style="font-size:10px;color:var(--text3)">No deadline</span>';
  const d=daysLeft(dl);
  if(d<0)return '<span class="badge b-lost">Hết hạn '+Math.abs(d)+'d</span>';
  if(d<=3)return '<span class="badge" style="background:rgba(255,118,117,0.2);color:#ff7675;border:1px solid rgba(255,118,117,0.3)">Còn '+d+'d ⚠</span>';
  if(d<=7)return '<span class="badge b-followup">Còn '+d+'d</span>';
  return '<span class="badge b-new">Còn '+d+'d</span>';
}

// ============================================================
// HELPERS
// ============================================================
function showLoading(v){document.getElementById('loading').style.display=v?'flex':'none'}

function sBadge(s){
  const m={'New':'b-new','Follow Up':'b-followup','Completed':'b-completed'};
  return `<span class="badge ${m[s]||'b-new'}">${s||'—'}</span>`;
}
function lBadge(s){
  const m={'Closedeal':'b-closedeal','Lost':'b-lost','Invalid Lead':'b-invalid','No Response':'b-noresponse','Busy':'b-busy'};
  return `<span class="badge ${m[s]||'b-new'}">${s||'—'}</span>`;
}
function saleInitials(c){
  const n=c.assigned_profile?.full_name||'?';
  return n.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
}
function saleAvClass(profileId){
  const idx=PROFILES.findIndex(p=>p.id===profileId);
  return AV_CLASSES[Math.max(0,idx)%AV_CLASSES.length];
}
function setPage(p){
  page=p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+p)?.classList.add('active');
  render();
}
function selOpts(arr,val='',empty='-- Chọn --'){
  return `<option value="">${empty}</option>`+arr.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('');
}

// ============================================================
// AUTH
// ============================================================
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('auth-error');
  errEl.style.display='none';
  if(!email||!pass){showErr('Vui lòng nhập email và mật khẩu');return;}
  btn.disabled=true;btn.textContent='Đang đăng nhập...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showErr(error.message);btn.disabled=false;btn.textContent='Đăng nhập';return;}
  await initApp(data.user);
}
function showErr(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';}
async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  CUSTOMERS=[];PROFILES=[];
}

// ============================================================
// INIT
// ============================================================
async function initApp(user){
  showLoading(true);
  currentUser=user;
  const {data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=profile;
  await loadCustomers();
  const {data:profs}=await sb.from('profiles').select('*').eq('is_active',true).order('full_name');
  PROFILES=profs||[];
  const initials=(profile?.full_name||user.email).split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
  document.getElementById('user-avatar').textContent=initials;
  document.getElementById('user-name').textContent=profile?.full_name||user.email;
  document.getElementById('user-role').textContent=profile?.role==='manager'?'Manager':profile?.role==='admin'?'Admin':'Sale';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  showLoading(false);
  render();
}

async function loadCustomers(){
  const {data,error}=await sb.from('customers')
    .select('*, assigned_profile:profiles!assigned_to(id,full_name,role)')
    .order('created_at',{ascending:false});
  if(!error) CUSTOMERS=data||[];
}

async function saveDetail(customerId){
  showLoading(true);
  const note=document.getElementById('d-note')?.value?.trim();
  const result=document.getElementById('d-result')?.value;
  const saleEl=document.getElementById('d-sale');
  const update={
    status:document.getElementById('d-status')?.value||null,
    sub_status:document.getElementById('d-substatus')?.value||null,
    lead_status:document.getElementById('d-leadstatus')?.value||null,
    potential:document.getElementById('d-potential')?.value||null,
    brand:document.getElementById('d-brand')?.value||null,
    business_name:document.getElementById('d-biz')?.value||null,
    customer_name:document.getElementById('d-name')?.value||null,
    state:document.getElementById('d-state')?.value||null,
    zipcode:document.getElementById('d-zip')?.value||null,
    times_of_use:document.getElementById('d-times')?.value||null,
    reason:document.getElementById('d-reason')?.value||null,
    description:document.getElementById('d-desc')?.value||null,
  };
  if(saleEl) update.assigned_to=saleEl.value;
  await sb.from('customers').update(update).eq('id',customerId);
  if(note) await sb.from('call_logs').insert({customer_id:customerId,sale_id:currentUser.id,note,call_result:result||null});
  await loadCustomers();
  document.getElementById('detail-modal')?.remove();
  selId=null;showLoading(false);render();
}

          <div class="field"><label>Cellphone</label><input id="a-cell" placeholder="SĐT di động"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>State *</label><select id="a-state"><option value="">-- Chọn State --</option>${STATE_OPTS.map(s=>`<option>${s}</option>`).join('')}</select></div>
          <div class="field"><label>Zipcode</label><input id="a-zip" placeholder="12345"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Potential (Sản phẩm)</label><select id="a-pot">${selOpts(POTENTIAL_OPTS)}</select></div>
          <div class="field"><label>Status</label><select id="a-status">${selOpts(STATUS_OPTS,'New')}</select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Sub-status</label><select id="a-substatus">${selOpts(SUBSTATUS_OPTS)}</select></div>
          <div class="field"><label>Brand</label><select id="a-brand">${selOpts(BRAND_OPTS)}</select></div>
        </div>
        <div class="field"><label>Description</label><textarea id="a-desc" placeholder="Ghi chú..."></textarea></div>
        <div class="field"><label>Sale Assigned</label>
          <select id="a-sale">
            <option value="${currentUser.id}">${currentProfile?.full_name||'Tôi'} (mặc định)</option>
            ${salePH.filter(p=>p.id!==currentUser.id).map(p=>`<option value="${p.id}">${p.full_name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="document.getElementById('add-modal').remove();addOpen=false">Hủy</button>
        <button class="btn btn-primary" onclick="doAdd()"><i class="ti ti-plus"></i> Thêm</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function doAdd(){
  const name=document.getElementById('a-name')?.value.trim();
  if(!name){alert('Vui lòng nhập Customer Name');return;}
  showLoading(true);
  const ts=Date.now().toString().slice(-6);
  const ma_kh='KH'+ts;
  const campaign=new Date().toLocaleDateString('vi-VN',{month:'2-digit',year:'numeric'});
  await sb.from('customers').insert({
    ma_kh,
    business_name:document.getElementById('a-biz')?.value||null,
    customer_name:name,
    business_phone:document.getElementById('a-bphone')?.value||null,
    cellphone:document.getElementById('a-cell')?.value||null,
    state:document.getElementById('a-state')?.value||null,
    zipcode:document.getElementById('a-zip')?.value||null,
    potential:document.getElementById('a-pot')?.value||null,
    status:document.getElementById('a-status')?.value||'New',
    sub_status:document.getElementById('a-substatus')?.value||null,
    brand:document.getElementById('a-brand')?.value||null,
    description:document.getElementById('a-desc')?.value||null,
    assigned_to:document.getElementById('a-sale')?.value||currentUser.id,
    created_by:currentUser.id,
    campaign_month:campaign,
  });
  await loadCustomers();
  document.getElementById('add-modal')?.remove();
  addOpen=false;showLoading(false);render();
}

// ============================================================
// MAIN RENDER
// ============================================================
// ============================================================
// RENDER — POTENTIAL CUSTOMERS
// ============================================================
function renderPotential(){
  const potData=CUSTOMERS.filter(c=>c.potential&&c.potential!='');
  return `
  <div class="topbar">
    <div class="topbar-title">Khách tiềm năng</div>
    <div style="font-size:12px;color:var(--text2)">Khách đã chọn Potential — không bị thu hồi theo deadline</div>
  </div>
  <div class="content">
    <div class="stats-row">
      <div class="stat-card sc0"><div class="stat-label">Tổng tiềm năng</div><div class="stat-val" style="color:var(--brand2)">${potData.length}</div></div>
      ${POTENTIAL_OPTS.map((p,i)=>{
        const cnt=potData.filter(c=>c.potential===p).length;
        return cnt>0?`<div class="stat-card sc${i%4}"><div class="stat-label">${p}</div><div class="stat-val" style="color:var(--accent)">${cnt}</div></div>`:'';
      }).join('')}
    </div>
    <div class="panel">
      <div class="panel-header"><h2>Danh sách <span style="color:var(--brand2)">${potData.length}</span> khách tiềm năng</h2></div>
      ${potData.length===0?'<div class="empty-state"><i class="ti ti-star"></i>Chưa có khách tiềm năng</div>':`
      <table>
        <colgroup><col width="85"><col width="130"><col width="120"><col width="100"><col width="80"><col width="120"><col width="80"><col width="80"><col width="65"></colgroup>
        <thead><tr><th>Mã KH</th><th>Business Name</th><th>Customer</th><th>Phone</th><th>State</th><th>Potential</th><th>Lead Status</th><th>Brand</th><th>Sale</th></tr></thead>
        <tbody>
        ${potData.slice(0,50).map(c=>`
          <tr onclick="selId=${c.id};setPage('customers')">
            <td style="font-size:10px;color:var(--text3);font-family:monospace">${c.ma_kh||'—'}</td>
            <td title="${c.business_name||''}">${c.business_name||'—'}</td>
            <td style="color:var(--text)">${c.customer_name}</td>
            <td style="font-family:monospace;font-size:11px">${c.cellphone||c.business_phone||'—'}</td>
            <td style="font-size:11px">${c.state||'—'}</td>
            <td style="font-size:11px;color:var(--accent);font-weight:500">${c.potential}</td>
            <td>${lBadge(c.lead_status)}</td>
            <td style="font-size:11px;color:var(--text2)">${c.brand||'—'}</td>
            <td style="font-size:11px;color:var(--text2)">${c.assigned_profile?.full_name?.split(' ').pop()||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;
}

// Thu hoi data het han
async function doRecall(){
  if(!confirm('Thu hồi tất cả khách hết deadline và chưa có Potential?')) return;
  showLoading(true);
  await sb.rpc('recall_expired_customers');
  await loadCustomers();
  showLoading(false);
  render();
  alert('Thu hồi hoàn tất!');
}

// Cap nhat deadline trong detail modal
async function setDeadline(customerId, deadline){
  await sb.from('customers').update({assigned_deadline: deadline||null}).eq('id', customerId);
  await loadCustomers();
  render();
}

function render(){
  const m=document.getElementById('main-area');
  if(page==='customers')m.innerHTML=renderCustomers();
  else if(page==='potential')m.innerHTML=renderPotential();
  else if(page==='pipeline')m.innerHTML=renderPipeline();
  else if(page==='kpi')m.innerHTML=renderKPI();
  if(selId&&!document.getElementById('detail-modal'))renderDetailModal(selId);
  if(addOpen&&!document.getElementById('add-modal'))renderAddModal();
}

// BOOT
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user) await initApp(session.user);
})();
</script>
</body>
</html>
