<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#6C5CE7;--brand2:#A29BFE;--brand-dark:#4834d4;
  --accent:#00CEC9;--accent2:#55EFC4;
  --warn:#FDCB6E;--danger:#FF7675;--success:#00B894;
  --sidebar:linear-gradient(160deg,#1a1240 0%,#2d1b69 50%,#1a2a4a 100%);

body{font-family:'Be Vietnam Pro',sans-serif;background:var(--main);color:var(--text);font-size:13px}

/* ---- AUTH SCREEN ---- */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--main);position:relative;overflow:hidden}
#auth-screen::before{content:'';position:absolute;top:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(108,92,231,0.3),transparent 70%);pointer-events:none}
#auth-screen::after{content:'';position:absolute;bottom:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(0,206,201,0.2),transparent 70%);pointer-events:none}
.auth-card{background:#1a1240;border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:380px;position:relative;z-index:1}
.auth-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(90deg,#fff,var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--text3);margin-bottom:28px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.auth-field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;outline:none;transition:border-color 0.2s}
.auth-field input:focus{border-color:var(--brand)}
.auth-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:'Be Vietnam Pro',sans-serif;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.auth-btn:hover{opacity:0.9}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed}
.auth-error{background:rgba(255,118,117,0.1);border:1px solid rgba(255,118,117,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--danger);margin-top:10px;display:none}

/* ---- APP LAYOUT ---- */
#app-screen{display:none;height:100vh}
.app{display:flex;height:100%;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--sidebar);display:flex;flex-direction:column;padding:0;position:relative;overflow:hidden}
.sidebar::before{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(108,92,231,0.4),transparent 70%);pointer-events:none}
.logo-wrap{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(90deg,#fff,var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.nav-sec{padding:16px 18px 6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:var(--text2);font-size:13px;position:relative;transition:all 0.2s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:#fff;background:rgba(108,92,231,0.25)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--brand),var(--accent));border-radius:0 2px 2px 0}
.nav-item i{font-size:16px;width:18px;text-align:center}
.user-area{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px;transition:color 0.2s}

.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--main)}

.search-wrap:focus-within{border-color:var(--brand)}

.search-wrap input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;transition:all 0.15s;font-weight:500}
.btn:hover{background:var(--surface2)}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-color:transparent;color:#fff;font-weight:600}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,92,231,0.4)}
.content{flex:1;overflow:auto;padding:18px 22px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;border:1px solid var(--border)}
.stat-card-0{background:linear-gradient(135deg,rgba(108,92,231,0.3),rgba(108,92,231,0.1))}
.stat-card-1{background:linear-gradient(135deg,rgba(0,206,201,0.25),rgba(0,206,201,0.08))}
.stat-card-2{background:linear-gradient(135deg,rgba(0,184,148,0.3),rgba(0,184,148,0.1))}
.stat-card-3{background:linear-gradient(135deg,rgba(253,203,110,0.25),rgba(253,203,110,0.08))}

.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02)}

table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:9px 12px;text-align:left;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}

tr:hover td{background:rgba(255,255,255,0.04);cursor:pointer}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-new{background:rgba(162,155,254,0.15);color:var(--brand2);border:1px solid rgba(162,155,254,0.3)}
.b-calling{background:rgba(0,206,201,0.15);color:var(--accent);border:1px solid rgba(0,206,201,0.3)}
.b-quoted{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}
.b-won{background:rgba(0,184,148,0.2);color:var(--accent2);border:1px solid rgba(85,239,196,0.35)}
.b-lost{background:rgba(255,118,117,0.15);color:var(--danger);border:1px solid rgba(255,118,117,0.3)}
.b-hot{background:rgba(255,118,117,0.15);color:#ff9f9f;border:1px solid rgba(255,118,117,0.25)}
.b-warm{background:rgba(253,203,110,0.15);color:#ffeaa7;border:1px solid rgba(253,203,110,0.25)}
.b-cold{background:rgba(116,185,255,0.15);color:#74b9ff;border:1px solid rgba(116,185,255,0.25)}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15)}
.av-0{background:linear-gradient(135deg,#6C5CE7,#a29bfe)}
.av-1{background:linear-gradient(135deg,#00cec9,#55efc4)}
.av-2{background:linear-gradient(135deg,#e17055,#fab1a0)}
.av-3{background:linear-gradient(135deg,#0984e3,#74b9ff)}
.av-4{background:linear-gradient(135deg,#fdcb6e,#ffeaa7)}
.av-5{background:linear-gradient(135deg,#00b894,#55efc4)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:#1a1240;border:1px solid var(--border);border-radius:18px;width:540px;max-height:88vh;overflow:auto;box-shadow:0 25px 60px rgba(0,0,0,0.6)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(108,92,231,0.1)}
.modal-header h3{font-size:15px;font-weight:700;flex:1}
.modal-body{padding:18px 20px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.field label{font-size:10px;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;outline:none;transition:border-color 0.2s}

.field select option{background:#1a1240}

.loading-overlay{position:fixed;inset:0;background:rgba(15,12,36,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(108,92,231,0.2);border-top-color:var(--brand);border-radius:50%;animation:spin 0.8s linear infinite}

.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.kpi-bar-bg{background:rgba(255,255,255,0.07);border-radius:4px;height:5px;overflow:hidden;margin-top:8px}
.kpi-bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,var(--brand),var(--accent))}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state i{font-size:48px;margin-bottom:12px;display:block}
.pipe-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px}
.pipe-col{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px}
.pipe-col-hd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pipe-cnt{background:rgba(255,255,255,0.08);border-radius:20px;padding:2px 8px;font-size:10px}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:7px;cursor:pointer;transition:all 0.2s}
.pipe-card:hover{border-color:var(--brand);transform:translateY(-2px)}
.pipe-card-name{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}

.pipe-card-ft{display:flex;justify-content:space-between;align-items:center}
</style>

<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">C-Silan CRM</div>
    <div class="auth-sub">Đăng nhập để vào hệ thống</div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="sale@csilan.com">
    </div>
    <div class="auth-field">
      <label>Mật khẩu</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="auth-btn" id="login-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="app-screen">
  <div class="app">
    <div class="sidebar">
      <div class="logo-wrap">
        <div class="logo-name">C-Silan CRM</div>
        <div class="logo-tag">Sales Team · v2.0</div>
      </div>
      <div class="nav-sec">Workspace</div>
      <div class="nav-item active" onclick="setPage('customers')" id="nav-customers"><i class="ti ti-users"></i> Khách hàng</div>
      <div class="nav-item" onclick="setPage('pipeline')" id="nav-pipeline"><i class="ti ti-layout-kanban"></i> Pipeline</div>
      <div class="nav-item" onclick="setPage('kpi')" id="nav-kpi"><i class="ti ti-chart-bar"></i> Báo cáo KPI</div>
      <div class="user-area">
        <div class="avatar av-0" id="user-avatar">--</div>
        <div><div class="user-name" id="user-name">--</div><div class="user-role" id="user-role">Sale</div></div>
        <button class="logout-btn" onclick="doLogout()" title="Đăng xuất"><i class="ti ti-logout"></i></button>
      </div>
    </div>
    <div class="main" id="main-area"></div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <span style="font-size:13px;color:var(--text2)">Đang tải...</span>
</div>

<script>
// ============================================================
// SUPABASE INIT
// ============================================================
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentProfile = null;
let CUSTOMERS = [];
let PROFILES = [];
let page = 'customers';
let fStatus = 'all', fSale = 'all', fPot = 'all', search = '';
let selId = null, addOpen = false;

const STATUSES = ['Mới','Đang liên hệ','Đã báo giá','Chốt thành công','Thất bại'];
const POTENTIALS = ['Hot','Warm','Cold'];
const BRANDS = ['Silan Pro','Silan Eco','Silan Plus'];
const SOURCES = ['Facebook','Zalo','Website','Referral','TikTok'];
const CITIES = ['TP.HCM','Hà Nội','Đà Nẵng','Cần Thơ','Bình Dương','Đồng Nai'];
const AV_CLASSES = ['av-0','av-1','av-2','av-3','av-4','av-5'];

// ============================================================
// AUTH
// ============================================================
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email || !pass) { showAuthError('Vui lòng nhập email và mật khẩu'); return; }
  btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showAuthError(error.message); btn.disabled = false; btn.textContent = 'Đăng nhập'; return; }
  await initApp(data.user);
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  CUSTOMERS = []; PROFILES = [];
}

// ============================================================
// INIT APP
// ============================================================
async function initApp(user) {
  showLoading(true);
  currentUser = user;
  // Load profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  // Load customers (RLS tự lọc theo role)
  await loadCustomers();
  // Load profiles (danh sách sale) — chỉ manager/admin thấy tất cả
  const { data: profs } = await sb.from('profiles').select('*').eq('is_active', true);
  PROFILES = profs || [];
  // Update UI
  const initials = (profile?.full_name || user.email).split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = profile?.full_name || user.email;
  document.getElementById('user-role').textContent = profile?.role === 'manager' ? 'Manager' : 'Sale';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  showLoading(false);
  render();
}

async function loadCustomers() {
  let query = sb.from('customers').select('*, assigned_profile:profiles!assigned_to(id,full_name,role)').order('created_at', { ascending: false });
  const { data, error } = await query;
  if (!error) CUSTOMERS = data || [];
}

// ============================================================
// HELPERS
// ============================================================
function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

function sBadge(s) {
  const m = {'Mới':'b-new','Đang liên hệ':'b-calling','Đã báo giá':'b-quoted','Chốt thành công':'b-won','Thất bại':'b-lost'};
  return `<span class="badge ${m[s]||'b-new'}">${s}</span>`;
}
function pBadge(p) {
  const m = {'Hot':'b-hot','Warm':'b-warm','Cold':'b-cold'};
  return `<span class="badge ${m[p]||'b-cold'}">${p}</span>`;
}
function saleInitials(c) {
  const n = c.assigned_profile?.full_name || '?';
  return n.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
}
function saleAvClass(profileId) {
  const idx = PROFILES.findIndex(p=>p.id===profileId);
  return AV_CLASSES[idx % AV_CLASSES.length] || 'av-0';
}

function setPage(p) {
  page = p;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+p)?.classList.add('active');
  render();
}

// ============================================================
// RENDER — CUSTOMERS
// ============================================================
function renderCustomers() {
  let data = CUSTOMERS.filter(c => {
    if (fStatus !== 'all' && c.status !== fStatus) return false;
    if (fSale !== 'all' && c.assigned_to !== fSale) return false;
    if (fPot !== 'all' && c.potential !== fPot) return false;
    if (search && !c.customer_name?.toLowerCase().includes(search)
               && !c.cellphone?.includes(search)
               && !c.business_name?.toLowerCase().includes(search)) return false;
    return true;
  });
  const won = CUSTOMERS.filter(c=>c.status==='Chốt thành công').length;
  const calling = CUSTOMERS.filter(c=>c.status==='Đang liên hệ').length;
  const isManager = currentProfile?.role === 'manager' || currentProfile?.role === 'admin';
  return `
  <div class="topbar">
    <div class="topbar-title">Khách hàng</div>
    <div class="search-wrap"><i class="ti ti-search"></i><input placeholder="Tìm tên, SĐT, công ty..." oninput="search=this.value.toLowerCase();render()" value="${search}"></div>
    <button class="btn btn-primary" onclick="addOpen=true;render()"><i class="ti ti-plus"></i> Thêm khách</button>
  </div>
  <div class="content">
    <div class="stats-row">
      <div class="stat-card stat-card-0"><div class="stat-glow" style="background:var(--brand);opacity:0.3"></div><div class="stat-label">Tổng data</div><div class="stat-val" style="color:var(--brand2)">${CUSTOMERS.length}</div><div class="stat-sub">được giao</div></div>
      <div class="stat-card stat-card-1"><div class="stat-glow" style="background:var(--accent);opacity:0.3"></div><div class="stat-label">Đang liên hệ</div><div class="stat-val" style="color:var(--accent)">${calling}</div><div class="stat-sub">khách</div></div>
      <div class="stat-card stat-card-2"><div class="stat-glow" style="background:var(--success);opacity:0.3"></div><div class="stat-label">Chốt thành công</div><div class="stat-val" style="color:var(--accent2)">${won}</div><div class="stat-sub">khách</div></div>
      <div class="stat-card stat-card-3"><div class="stat-glow" style="background:var(--warn);opacity:0.3"></div><div class="stat-label">Tỉ lệ chốt</div><div class="stat-val" style="color:var(--warn)">${CUSTOMERS.length?Math.round(won/CUSTOMERS.length*100):0}%</div><div class="stat-sub">tháng này</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Danh sách <span style="color:var(--brand2)">${data.length}</span> khách</h2>
        <div style="display:flex;gap:6px">
          <select class="fsel" onchange="fStatus=this.value;render()">
            <option value="all">Tất cả trạng thái</option>
            ${STATUSES.map(s=>`<option value="${s}" ${fStatus===s?'selected':''}>${s}</option>`).join('')}
          </select>
          ${isManager ? `<select class="fsel" onchange="fSale=this.value;render()">
            <option value="all">Tất cả sale</option>
            ${PROFILES.filter(p=>p.role==='sale').map(p=>`<option value="${p.id}" ${fSale===p.id?'selected':''}>${p.full_name}</option>`).join('')}
          </select>` : ''}
          <select class="fsel" onchange="fPot=this.value;render()">
            <option value="all">Tiềm năng</option>
            ${POTENTIALS.map(p=>`<option value="${p}" ${fPot===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
      </div>
      ${data.length === 0 ? `<div class="empty-state"><i class="ti ti-inbox"></i>Không có khách hàng nào</div>` : `
      <table>
        <colgroup><col width="88"><col width="140"><col width="130"><col width="105"><col width="68"><col width="90"><col width="76"><col width="70"></colgroup>
        <thead><tr><th>Mã KH</th><th>Công ty</th><th>Khách hàng</th><th>SĐT</th><th>Tiềm năng</th><th>Trạng thái</th><th>Brand</th><th>Sale</th></tr></thead>
        <tbody>
        ${data.slice(0,20).map(c=>`
          <tr onclick="selId=${c.id};render()">
            <td style="font-size:10px;color:var(--text3);font-family:monospace">${c.ma_kh}</td>
            <td title="${c.business_name||''}">${c.business_name||'—'}</td>
            <td><div style="display:flex;align-items:center;gap:7px"><div class="avatar ${saleAvClass(c.assigned_to)}">${saleInitials(c)}</div><span style="color:var(--text)">${c.customer_name}</span></div></td>
            <td style="font-family:monospace;font-size:11px">${c.cellphone||c.business_phone||'—'}</td>
            <td>${pBadge(c.potential||'Cold')}</td>
            <td>${sBadge(c.status)}</td>
            <td style="font-size:11px;color:var(--text2)">${c.brand||'—'}</td>
            <td style="font-size:11px;color:var(--text2)">${c.assigned_profile?.full_name?.split(' ').pop()||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${data.length>20?`<div style="padding:8px 14px;font-size:11px;color:var(--text3);border-top:1px solid rgba(255,255,255,0.05)">Hiển thị 20/${data.length} — dùng filter để thu hẹp</div>`:''}
      `}
    </div>
  </div>`;
}

// ============================================================
// RENDER — PIPELINE
// ============================================================
function renderPipeline() {
  const pipeColors = ['var(--brand2)','var(--accent)','var(--warn)','var(--accent2)','var(--danger)'];
  return `
  <div class="topbar"><div class="topbar-title">Pipeline</div></div>
  <div class="content" style="padding:0;overflow:auto">
    <div class="pipe-grid">
      ${STATUSES.map((status, i) => {
        const cards = CUSTOMERS.filter(c => c.status === status);
        return `<div class="pipe-col">
          <div class="pipe-col-hd" style="color:${pipeColors[i]}">${status}<span class="pipe-cnt">${cards.length}</span></div>
          ${cards.slice(0,6).map(c=>`
            <div class="pipe-card" onclick="selId=${c.id};setPage('customers')">
              <div class="pipe-card-name">${c.customer_name}</div>
              <div class="pipe-card-biz">${c.business_name||'—'}</div>
              <div class="pipe-card-ft">${pBadge(c.potential||'Cold')}<div class="avatar ${saleAvClass(c.assigned_to)}" style="width:22px;height:22px;font-size:9px">${saleInitials(c)}</div></div>
            </div>`).join('')}
          ${cards.length>6?`<div style="font-size:10px;color:var(--text3);text-align:center;padding:6px">+${cards.length-6} khác</div>`:''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ============================================================
// RENDER — KPI
// ============================================================
function renderKPI() {
  const salesToShow = PROFILES.filter(p => p.role === 'sale');
  return `
  <div class="topbar"><div class="topbar-title">Báo cáo KPI</div></div>
  <div class="content">
    <div class="kpi-grid">
      ${salesToShow.length === 0
        ? `<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-users"></i>Không có dữ liệu sale</div>`
        : salesToShow.map((s, si) => {
          const mc = CUSTOMERS.filter(c => c.assigned_to === s.id);
          const won = mc.filter(c=>c.status==='Chốt thành công').length;
          const pct = mc.length ? Math.round(won/mc.length*100) : 0;
          return `<div class="kpi-card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <div class="avatar ${AV_CLASSES[si%AV_CLASSES.length]}" style="width:36px;height:36px;font-size:12px">${s.full_name.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase()}</div>
              <div><div style="font-size:13px;font-weight:600">${s.full_name}</div><div style="font-size:10px;color:var(--text3)">${mc.length} khách</div></div>
            </div>
            <div style="display:flex;gap:14px;margin-bottom:8px">
              ${[['Chốt',won,'var(--accent2)'],['Gọi',mc.filter(c=>c.status==='Đang liên hệ').length,'var(--accent)'],['BG',mc.filter(c=>c.status==='Đã báo giá').length,'var(--warn)'],['Thất bại',mc.filter(c=>c.status==='Thất bại').length,'var(--danger)']].map(([l,v,col])=>`
              <div style="text-align:center"><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:${col}">${v}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">${l}</div></div>`).join('')}
            </div>
            <div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:${pct}%"></div></div>
            <div style="font-size:10px;color:var(--text3);text-align:right;margin-top:4px">Tỉ lệ: <strong style="color:var(--brand2)">${pct}%</strong></div>
          </div>`;
        }).join('')}
    </div>
  </div>`;
}

// ============================================================
// MODAL — DETAIL
// ============================================================
async function renderDetailModal(customerId) {
  const c = CUSTOMERS.find(x => x.id === customerId);
  if (!c) return;
  // Load call logs
  const { data: logs } = await sb.from('call_logs').select('*').eq('customer_id', customerId).order('called_at', { ascending: false }).limit(10);
  const isManager = currentProfile?.role === 'manager' || currentProfile?.role === 'admin';
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'detail-modal';
  modal.onclick = (e) => { if(e.target===modal){ modal.remove(); selId=null; } };
  modal.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="avatar ${saleAvClass(c.assigned_to)}" style="width:38px;height:38px;font-size:13px">${saleInitials(c)}</div>
        <div style="flex:1"><h3>${c.customer_name}</h3><div style="font-size:11px;color:var(--text3)">${c.business_name||'—'} · <span style="font-family:monospace">${c.ma_kh}</span></div></div>
        <button class="btn" style="padding:5px 8px" onclick="document.getElementById('detail-modal').remove();selId=null"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label>Trạng thái</label>
            <select id="d-status">${STATUSES.map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="field"><label>Tiềm năng</label>
            <select id="d-pot">${POTENTIALS.map(p=>`<option ${c.potential===p?'selected':''}>${p}</option>`).join('')}</select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>SĐT di động</label><input value="${c.cellphone||''}" readonly></div>
          <div class="field"><label>SĐT công ty</label><input value="${c.business_phone||''}" readonly></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Email</label><input value="${c.email||''}" readonly></div>
          <div class="field"><label>Thành phố</label><input value="${c.city||''}" readonly></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Brand</label><input value="${c.brand||''}" readonly></div>
          <div class="field"><label>Nguồn</label><input value="${c.source||''}" readonly></div>
        </div>
        ${isManager ? `<div class="field"><label>Sale phụ trách</label>
          <select id="d-sale">${PROFILES.filter(p=>p.role==='sale').map(p=>`<option value="${p.id}" ${c.assigned_to===p.id?'selected':''}>${p.full_name}</option>`).join('')}</select></div>` : ''}
        <div style="border-top:1px solid rgba(255,255,255,0.08);margin:14px 0 10px;padding-top:12px">
          <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px">Lịch sử liên hệ</div>
          ${(logs||[]).length === 0 ? '<div style="font-size:12px;color:var(--text3);padding:8px 0">Chưa có ghi chú nào</div>' :
            (logs||[]).map(l=>`<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:10px">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--brand);box-shadow:0 0 8px var(--brand);flex-shrink:0;margin-top:5px"></div>
              <div><div style="font-size:12px;color:var(--text2)">${l.note}</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${new Date(l.called_at).toLocaleString('vi-VN')}</div></div>
            </div>`).join('')}
        </div>
        <div class="field"><label>Kết quả cuộc gọi</label>
          <select id="d-result"><option value="">-- Chọn kết quả --</option>${['Bắt máy','Không bắt máy','Hẹn gọi lại','Từ chối','Quan tâm','Chốt'].map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div class="field"><label>Ghi chú</label>
          <textarea id="d-note" placeholder="Nhập nội dung cuộc gọi..."></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="document.getElementById('detail-modal').remove();selId=null">Đóng</button>
        <button class="btn btn-primary" onclick="saveDetail(${c.id})"><i class="ti ti-device-floppy"></i> Lưu</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveDetail(customerId) {
  showLoading(true);
  const status = document.getElementById('d-status')?.value;
  const potential = document.getElementById('d-pot')?.value;
  const note = document.getElementById('d-note')?.value?.trim();
  const result = document.getElementById('d-result')?.value;
  const saleEl = document.getElementById('d-sale');
  // Update customer
  const update = { status, potential };
  if (saleEl) update.assigned_to = saleEl.value;
  await sb.from('customers').update(update).eq('id', customerId);
  // Insert call log
  if (note) {
    await sb.from('call_logs').insert({ customer_id: customerId, sale_id: currentUser.id, note, call_result: result||null });
  }
  await loadCustomers();
  document.getElementById('detail-modal')?.remove();
  selId = null;
  showLoading(false);
  render();
}

// ============================================================
// MODAL — ADD CUSTOMER
// ============================================================
function renderAddModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'add-modal';
  modal.onclick = (e) => { if(e.target===modal){ modal.remove(); addOpen=false; } };
  modal.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header"><h3>Thêm khách hàng mới</h3>
        <button class="btn" style="padding:5px 8px" onclick="document.getElementById('add-modal').remove();addOpen=false"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label>Tên khách hàng *</label><input id="a-name" placeholder="Nguyễn Văn A"></div>
          <div class="field"><label>Tên công ty</label><input id="a-biz"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>SĐT di động *</label><input id="a-cell" placeholder="0901234567"></div>
          <div class="field"><label>SĐT công ty</label><input id="a-bphone"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Email</label><input id="a-email" type="email"></div>
          <div class="field"><label>Thành phố</label><select id="a-city">${CITIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Brand</label><select id="a-brand">${BRANDS.map(b=>`<option>${b}</option>`).join('')}</select></div>
          <div class="field"><label>Tiềm năng</label><select id="a-pot">${POTENTIALS.map(p=>`<option>${p}</option>`).join('')}</select></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Nguồn</label><select id="a-src">${SOURCES.map(s=>`<option>${s}</option>`).join('')}</select></div>
          <div class="field"><label>Sale phụ trách</label><select id="a-sale">${PROFILES.filter(p=>p.role==='sale').map(p=>`<option value="${p.id}">${p.full_name}</option>`).join('')}</select></div>
        </div>
        <div class="field"><label>Ghi chú</label><textarea id="a-note" placeholder="Thông tin thêm..."></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="document.getElementById('add-modal').remove();addOpen=false">Hủy</button>
        <button class="btn btn-primary" onclick="doAdd()"><i class="ti ti-plus"></i> Thêm</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function doAdd() {
  const name = document.getElementById('a-name')?.value.trim();
  const cell  = document.getElementById('a-cell')?.value.trim();
  if (!name || !cell) { alert('Vui lòng nhập tên và SĐT'); return; }
  showLoading(true);
  const ts = Date.now().toString().slice(-5);
  const ma_kh = 'KH' + ts;
  await sb.from('customers').insert({
    ma_kh, customer_name: name,
    business_name: document.getElementById('a-biz')?.value || null,
    cellphone: cell,
    business_phone: document.getElementById('a-bphone')?.value || null,
    email: document.getElementById('a-email')?.value || null,
    city: document.getElementById('a-city')?.value,
    brand: document.getElementById('a-brand')?.value,
    potential: document.getElementById('a-pot')?.value,
    source: document.getElementById('a-src')?.value,
    assigned_to: document.getElementById('a-sale')?.value || currentUser.id,
    created_by: currentUser.id,
    status: 'Mới',
    campaign_month: new Date().toLocaleDateString('vi-VN', {month:'2-digit',year:'numeric'}).replace('/','/')
  });
  await loadCustomers();
  document.getElementById('add-modal')?.remove();
  addOpen = false;
  showLoading(false);
  render();
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  const m = document.getElementById('main-area');
  if (page === 'customers') m.innerHTML = renderCustomers();
  else if (page === 'pipeline') m.innerHTML = renderPipeline();
  else if (page === 'kpi') m.innerHTML = renderKPI();
  // Open modals
  if (selId && !document.getElementById('detail-modal')) renderDetailModal(selId);
  if (addOpen && !document.getElementById('add-modal')) renderAddModal();
}

// ============================================================
// BOOT — Kiểm tra session cũ
// ============================================================
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    await initApp(session.user);
  }
})();
</script>
</body>
</html>
