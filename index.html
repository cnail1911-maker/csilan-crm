<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#6C5CE7;--brand2:#A29BFE;--brand-dark:#4834d4;
  --accent:#00CEC9;--accent2:#55EFC4;
  --warn:#FDCB6E;--danger:#FF7675;--success:#00B894;
  --main:#0f0c24;--surface:rgba(255,255,255,0.05);--surface2:rgba(255,255,255,0.08);
  --text:#F0EEFF;--text2:rgba(240,238,255,0.6);--text3:rgba(240,238,255,0.35);
  --border:rgba(255,255,255,0.1);
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--main);color:var(--text);font-size:13px}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--main);position:relative;overflow:hidden}
#auth-screen::before{content:'';position:absolute;top:-100px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(108,92,231,0.3),transparent 70%);pointer-events:none}
.auth-card{background:#1a1240;border:1px solid var(--border);border-radius:20px;padding:36px 40px;width:380px;position:relative;z-index:1}
.auth-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(90deg,#fff,var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--text3);margin-bottom:28px}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.auth-field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;outline:none}
.auth-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:'Be Vietnam Pro',sans-serif;cursor:pointer}
.auth-error{background:rgba(255,118,117,0.1);border:1px solid rgba(255,118,117,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--danger);margin-top:10px;display:none}
#app-screen{display:none;height:100vh}
.app{display:flex;height:100%;overflow:hidden}
.sidebar{width:215px;min-width:215px;background:linear-gradient(160deg,#1a1240 0%,#2d1b69 50%,#1a2a4a 100%);display:flex;flex-direction:column;position:relative;overflow:hidden}
.logo-wrap{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;background:linear-gradient(90deg,#fff,var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.nav-sec{padding:16px 18px 6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:var(--text2);font-size:13px;position:relative;transition:all 0.2s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-item.active{color:#fff;background:rgba(108,92,231,0.25)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--brand),var(--accent));border-radius:0 2px 2px 0}
.nav-item i{font-size:16px;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:9px;padding:1px 6px;border-radius:20px;font-weight:700}
.user-area{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
.user-name{font-size:12px;font-weight:600}
.user-role{font-size:10px;color:var(--text3)}
.logout-btn{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:4px;border-radius:6px}
.logout-btn:hover{color:var(--danger)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:12px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);flex-wrap:wrap}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;flex:1}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 12px;width:220px}
.search-wrap:focus-within{border-color:var(--brand)}
.search-wrap input{background:transparent;border:none;outline:none;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;width:100%}
.search-wrap input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;transition:all 0.15s;font-weight:500}
.btn:hover{background:var(--surface2)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-dark));border-color:transparent;color:#fff;font-weight:600}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(108,92,231,0.4)}
.btn-danger{border-color:rgba(255,118,117,0.4);color:var(--danger)}
.content{flex:1;overflow:auto;padding:16px 20px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;border:1px solid var(--border)}
.sc0{background:linear-gradient(135deg,rgba(108,92,231,0.3),rgba(108,92,231,0.1))}
.sc1{background:linear-gradient(135deg,rgba(0,206,201,0.25),rgba(0,206,201,0.08))}
.sc2{background:linear-gradient(135deg,rgba(0,184,148,0.3),rgba(0,184,148,0.1))}
.sc3{background:linear-gradient(135deg,rgba(253,203,110,0.25),rgba(253,203,110,0.08))}
.stat-label{font-size:10px;color:var(--text2);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.stat-sub{font-size:10px;color:var(--text3);margin-top:3px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.panel-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.02)}
.panel-header h2{font-size:13px;font-weight:600;flex:1}
.fsel{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 8px;border-radius:7px;font-family:'Be Vietnam Pro',sans-serif;cursor:pointer;outline:none}
.fsel option{background:#1a1240}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:8px 10px;text-align:left;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02)}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.04);cursor:pointer}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-new{background:rgba(162,155,254,0.15);color:var(--brand2);border:1px solid rgba(162,155,254,0.3)}
.b-followup{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}
.b-completed{background:rgba(0,184,148,0.2);color:var(--accent2);border:1px solid rgba(85,239,196,0.35)}
.b-closedeal{background:rgba(0,184,148,0.2);color:var(--accent2);border:1px solid rgba(85,239,196,0.35)}
.b-lost{background:rgba(255,118,117,0.15);color:var(--danger);border:1px solid rgba(255,118,117,0.3)}
.b-invalid{background:rgba(255,118,117,0.1);color:#ffb3b3;border:1px solid rgba(255,118,117,0.2)}
.b-noresponse{background:rgba(116,185,255,0.15);color:#74b9ff;border:1px solid rgba(116,185,255,0.25)}
.b-busy{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}
.avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.15)}
.av-0{background:linear-gradient(135deg,#6C5CE7,#a29bfe)}
.av-1{background:linear-gradient(135deg,#00cec9,#55efc4)}
.av-2{background:linear-gradient(135deg,#e17055,#fab1a0)}
.av-3{background:linear-gradient(135deg,#0984e3,#74b9ff)}
.av-4{background:linear-gradient(135deg,#fdcb6e,#ffeaa7)}
.av-5{background:linear-gradient(135deg,#00b894,#55efc4)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:#1a1240;border:1px solid var(--border);border-radius:18px;width:580px;max-height:90vh;overflow:auto;box-shadow:0 25px 60px rgba(0,0,0,0.6)}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(108,92,231,0.1)}
.modal-header h3{font-size:15px;font-weight:700;flex:1}
.modal-body{padding:16px 18px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:10px;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
.field input,.field select,.field textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);font-family:'Be Vietnam Pro',sans-serif;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
.field select option{background:#1a1240}
.field textarea{resize:vertical;min-height:60px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.loading-overlay{position:fixed;inset:0;background:rgba(15,12,36,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(108,92,231,0.2);border-top-color:var(--brand);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state i{font-size:40px;margin-bottom:10px;display:block}
.pipe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.pipe-col{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px}
.pipe-col-hd{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pipe-cnt{background:rgba(255,255,255,0.08);border-radius:20px;padding:2px 8px;font-size:10px}
.pipe-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
.pipe-card:hover{border-color:var(--brand);transform:translateY(-1px)}
.pipe-card-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pipe-card-biz{font-size:10px;color:var(--text3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipe-card-ft{display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}
.pgbar{padding:8px 12px;border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:6px;justify-content:space-between}
.pgbar-info{font-size:11px;color:var(--text3)}
.pgbar-btns{display:flex;gap:3px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px}
.kpi-bar-bg{background:rgba(255,255,255,0.07);border-radius:4px;height:5px;overflow:hidden;margin-top:6px}
.kpi-bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,var(--brand),var(--accent))}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">C-Silan CRM</div>
    <div class="auth-sub">Đăng nhập để vào hệ thống</div>

    <div class="auth-field"><label>Mật khẩu</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="auth-btn" id="login-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>
<div id="app-screen">
  <div class="app">
    <div class="sidebar">
      <div class="logo-wrap">
        <div class="logo-name">C-Silan CRM</div>
        <div class="logo-tag">Sales Team · v5.0</div>
      </div>
      <div class="nav-sec">Workspace</div>

      <div class="nav-item" onclick="setPage('closedeal')" id="nav-closedeal"><i class="ti ti-trophy"></i> Closedeal <span class="nav-badge" id="badge-cd" style="display:none">0</span></div>
      <div class="nav-item" onclick="setPage('pipeline')" id="nav-pipeline"><i class="ti ti-layout-kanban"></i> Pipeline</div>
      <div class="nav-item" onclick="setPage('pending')" id="nav-pending"><i class="ti ti-clock"></i> Chờ duyệt <span class="nav-badge" id="badge-pending" style="display:none">0</span></div>
      <div class="nav-item" onclick="setPage('kpi')" id="nav-kpi"><i class="ti ti-chart-bar"></i> Báo cáo KPI</div>
      <div class="nav-item" onclick="setPage('campaign')" id="nav-campaign"><i class="ti ti-speakerphone"></i> Campaign</div>
      <div class="nav-item" onclick="setPage('alert')" id="nav-alert"><i class="ti ti-bell"></i> Cảnh báo <span class="nav-badge" id="badge-alert" style="display:none">0</span></div>
      <div class="nav-item" onclick="setPage('products')" id="nav-products" style="display:none"><i class="ti ti-package"></i> Sản phẩm</div>
      <div class="user-area">
        <div class="avatar av-0" id="user-avatar">--</div>
        <div><div class="user-name" id="user-name">--</div><div class="user-role" id="user-role">Sale</div></div>
        <button class="logout-btn" onclick="doLogout()" title="Đăng xuất"><i class="ti ti-logout"></i></button>
      </div>
    </div>
    <div class="main" id="main-area"></div>
  </div>
</div>
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
  <span style="font-size:13px;color:var(--text2)">Đang tải...</span>
</div>
<script>
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON);

// DROPDOWN DATA
const POTENTIAL_OPTS=['Pedicure Spa & Package','Massage Chair','Furniture','Padset','Heaspa','HeadSpa Bed','Part & Accessories'];
const STATUS_OPTS=['New','Follow Up','Completed'];
const SUBSTATUS_OPTS=['New Lead','No Answer','Contacting','Gatekeeper','Qualified','Appointment Set','Quotation Sent','Pending Decision','Follow Up'];
const LEAD_OPTS=['Closedeal','Lost','Invalid Lead','No Response','Busy'];
const BRAND_OPTS=['TSPA','T4','LEXOR','WHALE SPA','SNS','CONTEGO','NEWSTAR','JNA','AYC','SAM SUPPLY','GULFSTREAM','SNE','TREND NAILS','S3 SPA','MR3','OSAKI','ALFAFA','HÃNG KHÁC'];
const TIMES_OPTS=['1 year','2 year','3 year','more than 5 year'];
const REASON_OPTS=['R1 - Khách chưa có nhu cầu','R2 - Khách bận','R3 - Franchise không cho mua ngoài','R4 - Đổi nhu cầu','R5 - Có nhu cầu nhưng rất xa','R6 - Chỉ tham khảo','R7 - Không muốn tiếp tục','R8 - Giá chưa phù hợp','R9 - Đang so sánh','R10 - Ngại mua hàng xa','R11 - Lo ngại lắp đặt','R12 - Mới thay nội thất','R13 - Chủ đã bán tiệm','R14 - Đang build tiệm','R15 - Chỉ dùng thương hiệu khác','R16 - Sai số','R17 - Không gặp người quyết định','R18 - Chưa có ngân sách','R19 - Đang làm với vendor khác','R20 - Khó giao tiếp','R21 - Mất liên lạc'];
const STATE_OPTS=['Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York','North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont','Virginia','Washington','Washington, D.C.','West Virginia','Wisconsin','Wyoming'];
const AV_CLASSES=['av-0','av-1','av-2','av-3','av-4','av-5'];
const PAGE_SIZE=50;

// STATE
let currentUser=null,currentProfile=null,CUSTOMERS=[],PROFILES=[],PRODUCTS_ALL=[],INVOICES=[];
let page='customers',fStatus='all',fSale='all',fPotential='all',fBrand='all',search='',selId=null,addOpen=false;
let curPage=1,potPage=1,cdPage=1,pdPage=1,fPendingSale='all';
let pipePage={};

// HELPERS
function showLoading(v){document.getElementById('loading').style.display=v?'flex':'none';}
function sBadge(s){const m={'New':'b-new','Follow Up':'b-followup','Completed':'b-completed'};return '<span class="badge '+(m[s]||'b-new')+'">'+( s||'—')+'</span>';}
function lBadge(s){const m={'Closedeal':'b-closedeal','Lost':'b-lost','Invalid Lead':'b-invalid','No Response':'b-noresponse','Busy':'b-busy'};return s?'<span class="badge '+(m[s]||'b-new')+'">'+s+'</span>':'<span style="font-size:10px;color:var(--text3)">—</span>';}
function saleInitials(c){const n=(c.assigned_profile&&c.assigned_profile.full_name)||'?';return n.split(' ').map(function(w){return w[0];}).slice(-2).join('').toUpperCase();}
function saleAvClass(pid){const idx=PROFILES.findIndex(function(p){return p.id===pid;});return AV_CLASSES[Math.max(0,idx)%AV_CLASSES.length];}
function selOpts(arr,val,empty){var r='<option value="">'+(empty||'-- Chọn --')+'</option>';arr.forEach(function(o){r+='<option'+(val===o?' selected':'')+'>'+o+'</option>';});return r;}
function fmtDate(d){return d?new Date(d).toLocaleDateString('vi-VN'):'—';}
function fmtDateTime(d){return d?new Date(d).toLocaleString('vi-VN'):'—';}
function daysLeft(dl){if(!dl)return null;return Math.ceil((new Date(dl)-new Date())/864e5);}
function dlBadge(dl){
  if(!dl)return '<span style="font-size:10px;color:var(--text3)">No deadline</span>';
  const d=daysLeft(dl);
  if(d<0)return '<span class="badge b-lost">Hết hạn '+Math.abs(d)+'d</span>';
  if(d<=3)return '<span class="badge" style="background:rgba(255,118,117,0.2);color:#ff7675;border:1px solid rgba(255,118,117,0.3)">Còn '+d+'d ⚠</span>';
  if(d<=7)return '<span class="badge b-followup">Còn '+d+'d</span>';
  return '<span class="badge b-new">Còn '+d+'d</span>';
}
function phoneTd(c){
  var r='';
  if(c.cellphone)r+='<div>'+c.cellphone+'</div>';
  if(c.business_phone)r+='<div style="color:var(--text3);font-size:10px">'+c.business_phone+'</div>';
  return r||'—';
}
function pgBar(total,pg,pgSize,setter){
  if(total<=pgSize)return '';
  const totalPg=Math.ceil(total/pgSize);
  const start=(pg-1)*pgSize+1;
  const end=Math.min(pg*pgSize,total);
  let btns='<button class="btn" style="padding:3px 9px;font-size:11px" onclick="'+setter+'('+Math.max(1,pg-1)+')" '+(pg===1?'disabled':'')+'>‹</button>';
  for(let i=1;i<=totalPg;i++){
    if(totalPg>7){if(i>1&&i<totalPg&&Math.abs(i-pg)>2)continue;}
    btns+='<button class="btn" style="padding:3px 9px;font-size:11px;'+(i===pg?'background:var(--brand);border-color:var(--brand);color:#fff':'')+'" onclick="'+setter+'('+i+')">'+i+'</button>';
  }
  btns+='<button class="btn" style="padding:3px 9px;font-size:11px" onclick="'+setter+'('+Math.min(totalPg,pg+1)+')" '+(pg===totalPg?'disabled':'')+'>›</button>';
  return '<div class="pgbar"><span class="pgbar-info">'+start+'-'+end+' / '+total+'</span><div class="pgbar-btns">'+btns+'</div></div>';
}

// AUTH
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const btn=document.getElementById('login-btn');
  const errEl=document.getElementById('auth-error');
  errEl.style.display='none';
  if(!email||!pass){errEl.textContent='Vui lòng nhập email và mật khẩu';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Đang đăng nhập...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent=error.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Đăng nhập';return;}
  await initApp(data.user);
}
async function doLogout(){await sb.auth.signOut();document.getElementById('app-screen').style.display='none';document.getElementById('auth-screen').style.display='flex';CUSTOMERS=[];PROFILES=[];}

// INIT
async function initApp(user){
  showLoading(true);currentUser=user;
  const {data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=profile;
  await loadCustomers();
  const {data:profs}=await sb.from('profiles').select('*').eq('is_active',true).order('full_name');
  PROFILES=profs||[];
  // Load invoices after auth is confirmed
  await loadInvoices();
  // Load products for manager
  const isManagerLoad=profile&&(profile.role==='manager'||profile.role==='admin');
  if(isManagerLoad){
    const {data:allProds}=await sb.from('products').select('*').order('name').limit(500);
    PRODUCTS_ALL=allProds||[];
  }
  const initials=((profile&&profile.full_name)||user.email).split(' ').map(function(w){return w[0];}).slice(-2).join('').toUpperCase();
  document.getElementById('user-avatar').textContent=initials;
  document.getElementById('user-name').textContent=(profile&&profile.full_name)||user.email;
  document.getElementById('user-role').textContent=profile&&profile.role==='manager'?'Manager':profile&&profile.role==='admin'?'Admin':'Sale';
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  // Show products & campaign nav for manager/admin
  const isManagerInit=currentProfile&&(currentProfile.role==='manager'||currentProfile.role==='admin');
  const prodNav=document.getElementById('nav-products');
  if(prodNav)prodNav.style.display=isManagerInit?'flex':'none';
  showLoading(false);render();
}

  if(error)console.error('Invoice load error:',error);

async function loadCustomers(){
  const {data,error}=await sb.from('customers')
    .select('*, assigned_profile:profiles!assigned_to(id,full_name,role), last_contacted, campaign_name')
    .order('created_at',{ascending:false})
    .limit(3000);
  if(!error)CUSTOMERS=data||[];
  // Update pending badge
  const isManager=currentProfile&&(currentProfile.role==='manager'||currentProfile.role==='admin');
  const pendingCount=isManager
    ?CUSTOMERS.filter(function(c){return c.approval_status==='pending';}).length
    :CUSTOMERS.filter(function(c){return c.approval_status==='pending'&&c.created_by===currentUser.id;}).length;
  const badge=document.getElementById('badge-pending');
  if(badge){badge.textContent=pendingCount;badge.style.display=pendingCount>0?'inline':'none';}
  // Update closedeal badge for pending invoices
  const pendingInvCount=INVOICES.filter(function(i){return i.approval_status==='pending';}).length;
  const cdBadge=document.getElementById('badge-cd');
  if(cdBadge){cdBadge.textContent=pendingInvCount;cdBadge.style.display=pendingInvCount>0?'inline':'none';}
  
  // Alert badge - potential customers not contacted for 3+ days
  const today=new Date();
  const alertCount=CUSTOMERS.filter(function(c){
    if(!c.potential||c.potential==='')return false;
    if(c.lead_status==='Closedeal')return false;
    const lastContact=c.last_contacted?new Date(c.last_contacted):new Date(c.created_at);
    const days=Math.floor((today-lastContact)/(1000*60*60*24));
    return days>=3;
  }).length;
  const alertBadge=document.getElementById('badge-alert');
  if(alertBadge){alertBadge.textContent=alertCount;alertBadge.style.display=alertCount>0?'inline':'none';}
}

async function approveInvoice(id,status){
  showLoading(true);
  const update={approval_status:status};
  if(status==='approved'){
    const inv=INVOICES.find(function(i){return i.id===id;});
    if(inv){
      await sb.from('customers').update({lead_status:'Closedeal',latest_invoice_no:inv.invoice_no,total_amount:inv.total}).eq('id',inv.customer_id);
    }
  }
  await sb.from('invoices').update(update).eq('id',id);
  await loadInvoices();
  await loadCustomers();
  showLoading(false);render();
}

function renderPipeline(){

        +'<div class="pipe-card-name">'+(c.customer_name||'')+'</div>'

        +'<div class="pipe-card-ft"><span style="font-size:10px;color:var(--accent)">'+(c.potential||'—')+'</span>'+lBadge(c.lead_status)
        +'<div class="avatar '+saleAvClass(c.assigned_to)+'" style="width:20px;height:20px;font-size:9px">'+saleInitials(c)+'</div></div>'
        +'</div>';
    });
    if(totalPg>1){
      html+='<div style="display:flex;gap:3px;justify-content:center;padding:6px;flex-wrap:wrap">';
      for(let p=1;p<=totalPg;p++){
        html+='<button class="btn" style="padding:2px 7px;font-size:10px;'+(p===pg?'background:var(--brand);border-color:var(--brand);color:#fff':'')+'" onclick="event.stopPropagation();setPipeP(\''+status+'\','+p+')">'+p+'</button>';

  });
  html+='</div></div>';
  return html;

// RENDER ALERT - Potential chưa liên hệ 3+ ngày
// ============================================================
function renderAlert(){
  const isManager=currentProfile&&(currentProfile.role==='manager'||currentProfile.role==='admin');
  const today=new Date();
  
  function getDays(c){
    const lastContact=c.last_contacted?new Date(c.last_contacted):new Date(c.created_at);
    return Math.floor((today-lastContact)/(1000*60*60*24));
  }
  
  // Khách có Potential, chưa Closedeal, chưa liên hệ 3+ ngày
  const alertData=CUSTOMERS.filter(function(c){
    if(!c.potential||c.potential==='')return false;
    if(c.lead_status==='Closedeal')return false;
    return getDays(c)>=3;
  }).sort(function(a,b){return getDays(b)-getDays(a);});

  function daysBadge(days){
    if(days>30)return '<span class="badge b-lost">'+days+'+ ngày</span>';
    if(days>=7)return '<span class="badge b-followup">'+days+' ngày</span>';
    return '<span class="badge b-calling">'+days+' ngày</span>';
  }

  let saleFilter=isManager?('<select class="fsel" style="font-size:12px;padding:7px 10px" onchange="fSale=this.value;render()"><option value="all">Tất cả sale</option>'+PROFILES.filter(function(p){return p.role==='sale';}).map(function(p){return '<option value="'+p.id+'"'+(fSale===p.id?' selected':'')+'>'+p.full_name+'</option>';}).join('')+'</select>'):'';

  const filtered=alertData.filter(function(c){return fSale==='all'||c.assigned_to===fSale;});
  const over30=filtered.filter(function(c){return getDays(c)>30;}).length;

  let rows='';
  filtered.slice(0,100).forEach(function(c){
    const days=getDays(c);
    rows+='<tr onclick="selId='+c.id+';setPage(\"customers\")">';
      +'<td style="font-size:10px;color:var(--text3);font-family:monospace">'+(c.ma_kh||'—')+'</td>'
      +'<td>'+(c.business_name||'—')+'</td>'
      +'<td style="color:var(--text)">'+(c.customer_name||'')+'</td>'
      +'<td style="font-size:10px">'+phoneTd(c)+'</td>'
      +'<td style="font-size:11px;color:var(--accent);font-weight:500">'+(c.potential||'—')+'</td>'
      +'<td>'+sBadge(c.status)+'</td>'
      +'<td>'+daysBadge(days)+'</td>'
      +'<td style="font-size:11px;color:var(--text2)">'+((c.assigned_profile&&c.assigned_profile.full_name)?c.assigned_profile.full_name.split(' ').pop():'—')+'</td>'
      +(isManager?'<td><button class="btn" style="padding:2px 8px;font-size:10px;border-color:rgba(255,118,117,0.4);color:var(--danger)" onclick="event.stopPropagation();recallOne('+c.id+')">Thu hồi</button></td>':'')
      +'</tr>';
  });

  return '<div class="topbar"><div class="topbar-title">Cảnh báo Potential</div>'+saleFilter+'</div>'
    +'<div class="content">'
    +'<div class="stats-row">'
    +'<div class="stat-card sc3"><div class="stat-label">Chưa liên hệ 3+ ngày</div><div class="stat-val" style="color:var(--warn)">'+filtered.length+'</div></div>'
    +'<div class="stat-card sc0"><div class="stat-label">Quá 30 ngày</div><div class="stat-val" style="color:var(--danger)">'+over30+'</div></div>'
    +'<div class="stat-card sc2"><div class="stat-label">Tổng Potential</div><div class="stat-val" style="color:var(--brand2)">'+CUSTOMERS.filter(function(c){return c.potential&&c.potential!=='';}).length+'</div></div>'
    +'</div>'
    +'<div class="panel"><div class="panel-header"><h2>Danh sách <span style="color:var(--warn)">'+filtered.length+'</span> cần follow up</h2>'
    +(isManager?'<button class="btn" style="border-color:rgba(255,118,117,0.4);color:var(--danger);font-size:11px" onclick="recallOver30()"><i class="ti ti-rotate-clockwise"></i> Thu hồi 30+ ngày</button>':'')
    +'</div>'
    +(filtered.length===0?'<div class="empty-state"><i class="ti ti-bell-off"></i>Không có cảnh báo nào!</div>'
      :'<table><colgroup><col width="80"><col width="120"><col width="110"><col width="90"><col width="100"><col width="75"><col width="80"><col width="65">'+(isManager?'<col width="70">':'')+'</colgroup>'
      +'<thead><tr><th>Mã KH</th><th>Business Name</th><th>Customer</th><th>Phone</th><th>Potential</th><th>Status</th><th>Chưa liên hệ</th><th>Sale</th>'+(isManager?'<th></th>':'')+'</tr></thead>'
      +'<tbody>'+rows+'</tbody></table>')
    +'</div></div>';
}

async function recallOne(id){
  if(!confirm('Thu hồi khách này?'))return;
  showLoading(true);
  await sb.from('customers').update({assigned_to:null,is_recalled:true,assigned_deadline:null}).eq('id',id);
  await loadCustomers();showLoading(false);render();
}

async function recallOver30(){
  const today=new Date();
  const ids=CUSTOMERS.filter(function(c){
    if(!c.potential||c.potential==='')return false;
    if(c.lead_status==='Closedeal')return false;
    const lastContact=c.last_contacted?new Date(c.last_contacted):new Date(c.created_at);
    const days=Math.floor((today-lastContact)/(1000*60*60*24));
    return days>30&&(fSale==='all'||c.assigned_to===fSale);
  }).map(function(c){return c.id;});
  if(ids.length===0){alert('Không có khách nào quá 30 ngày!');return;}
  if(!confirm('Thu hồi '+ids.length+' khách quá 30 ngày?'))return;
  showLoading(true);
  await sb.from('customers').update({assigned_to:null,is_recalled:true,assigned_deadline:null}).in('id',ids);
  await loadCustomers();showLoading(false);render();
  alert('Đã thu hồi '+ids.length+' khách!');
}

function renderCampaign(){
  const isManager=currentProfile&&(currentProfile.role==='manager'||currentProfile.role==='admin');
  // Group customers by campaign_name
  const campaigns={};
  CUSTOMERS.forEach(function(c){
    const name=c.campaign_name||c.campaign_month||'Không có campaign';
    if(!campaigns[name])campaigns[name]={name:name,total:0,new:0,followup:0,closedeal:0,customers:[]};
    campaigns[name].total++;
    if(c.status==='New')campaigns[name].new++;
    if(c.status==='Follow Up')campaigns[name].followup++;
    if(c.lead_status==='Closedeal')campaigns[name].closedeal++;
    campaigns[name].customers.push(c);
  });
  const campList=Object.values(campaigns).sort(function(a,b){return b.total-a.total;});

  let campCards='';
  campList.forEach(function(camp){
    const pct=camp.total?Math.round(camp.closedeal/camp.total*100):0;
    campCards+='<div class="kpi-card" style="cursor:pointer" onclick="goToCampaign()">';
      +'<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px">'+camp.name+'</div>'
      +'<div style="display:flex;gap:12px;margin-bottom:8px">'
      +'<div style="text-align:center"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:var(--brand2)">'+camp.total+'</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Total</div></div>'
      +'<div style="text-align:center"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:var(--accent)">'+camp.followup+'</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Follow</div></div>'
      +'<div style="text-align:center"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:var(--accent2)">'+camp.closedeal+'</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Closedeal</div></div>'
      +'<div style="text-align:center"><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:700;color:var(--warn)">'+pct+'%</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase">Tỉ lệ</div></div>'
      +'</div>'
      +'<div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:'+pct+'%"></div></div>'
      +'</div>';
  });

  // Campaign assign form - manager only
  let assignForm='';

async function createCampaign(){
  const name=document.getElementById('camp-name')&&document.getElementById('camp-name').value.trim();
  const saleId=document.getElementById('camp-sale')&&document.getElementById('camp-sale').value;
  const deadline=document.getElementById('camp-deadline')&&document.getElementById('camp-deadline').value;
  if(!name){alert('Vui lòng nhập tên Campaign!');return;}
  if(!deadline){alert('Vui lòng chọn Deadline!');return;}

  // Get unassigned customers
  const unassigned=CUSTOMERS.filter(function(c){return !c.assigned_to||c.assigned_to===null||c.is_recalled===true;});
  if(unassigned.length===0){alert('Không có data chưa phân công!');return;}
  if(!confirm('Phân công '+unassigned.length+' khách cho Campaign "'+name+'" với deadline '+deadline+'?'))return;

  showLoading(true);
  const salesList=saleId==='all'
    ?PROFILES.filter(function(p){return p.role==='sale';})
    :[PROFILES.find(function(p){return p.id===saleId;})].filter(Boolean);

  if(salesList.length===0){showLoading(false);alert('Không có sale nào!');return;}

  // Assign customers
  const updates=[];
  unassigned.forEach(function(c,i){
    const sale=salesList[i%salesList.length];
    updates.push({
      id:c.id,
      assigned_to:sale.id,
      campaign_name:name,
      assigned_deadline:deadline,
      is_recalled:false
    });
  });

  // Batch update
  for(let i=0;i<updates.length;i+=50){
    const batch=updates.slice(i,i+50);
    for(const u of batch){
      await sb.from('customers').update({
        assigned_to:u.assigned_to,
        campaign_name:u.campaign_name,
        assigned_deadline:u.assigned_deadline,
        is_recalled:false
      }).eq('id',u.id);
    }
  }

  await loadCustomers();showLoading(false);
  alert('Đã tạo Campaign "'+name+'" với '+unassigned.length+' khách!');
  document.getElementById('camp-name').value='';
  render();
}

    +'<div class="field-row"><div class="field"><label>Business Phone</label><input id="a-bphone" placeholder="SĐT công ty"></div>'
    +'<div class="field"><label>Cellphone</label><input id="a-cell" placeholder="SĐT di động"></div></div>'
    +'<div class="field-row"><div class="field"><label>State *</label><select id="a-state"><option value="">-- Chọn State --</option>'+STATE_OPTS.map(function(s){return '<option>'+s+'</option>';}).join('')+'</select></div>'
    +'<div class="field"><label>Zipcode</label><input id="a-zip" placeholder="12345"></div></div>'
    +'<div class="field-row"><div class="field"><label>Potential</label><select id="a-pot">'+selOpts(POTENTIAL_OPTS)+'</select></div>'
    +'<div class="field"><label>Status</label><select id="a-status">'+selOpts(STATUS_OPTS,'New')+'</select></div></div>'
    +'<div class="field-row"><div class="field"><label>Sub-status</label><select id="a-substatus">'+selOpts(SUBSTATUS_OPTS)+'</select></div>'
    +'<div class="field"><label>Brand</label><select id="a-brand">'+selOpts(BRAND_OPTS)+'</select></div></div>'
    +'<div class="field"><label>Description</label><textarea id="a-desc" placeholder="Ghi chú..."></textarea></div>'
    +'<div class="field"><label>Sale Assigned</label><select id="a-sale">'
    +'<option value="'+currentUser.id+'">'+(currentProfile&&currentProfile.full_name||'Tôi')+' (mặc định)</option>'
    +salePH.filter(function(p){return p.id!==currentUser.id;}).map(function(p){return '<option value="'+p.id+'">'+p.full_name+'</option>';}).join('')
    +'</select></div>'
    +'</div>'
    +'<div class="modal-footer">'
    +'<button class="btn" onclick="document.getElementById(\'add-modal\').remove();addOpen=false">Hủy</button>'
    +'<button class="btn btn-primary" onclick="doAdd()"><i class="ti ti-plus"></i> Thêm</button>'
    +'</div></div>';
  document.body.appendChild(modal);
}

async function doAdd(){
  const name=document.getElementById('a-name')&&document.getElementById('a-name').value.trim();
  if(!name){alert('Vui lòng nhập Customer Name');return;}
  showLoading(true);
  const cell=(document.getElementById('a-cell')&&document.getElementById('a-cell').value.trim())||'';
  const bphone=(document.getElementById('a-bphone')&&document.getElementById('a-bphone').value.trim())||'';
  let isDup=false;
  if(cell||bphone){
    const orParts=[];
    if(cell){orParts.push('cellphone.eq.'+cell);orParts.push('business_phone.eq.'+cell);}
    if(bphone){orParts.push('cellphone.eq.'+bphone);orParts.push('business_phone.eq.'+bphone);}
    const {data:dupCheck}=await sb.from('customers').select('id,customer_name,cellphone,business_phone').or(orParts.join(','));
    isDup=(dupCheck||[]).length>0;
    if(isDup){
      const dupNames=(dupCheck||[]).map(function(d){return d.customer_name;}).join(', ');
      showLoading(false);
      const go=confirm('Số điện thoại đã tồn tại!\nKhách trùng: '+dupNames+'\n\nVẫn thêm và gửi chờ manager duyệt?');
      if(!go)return;
      showLoading(true);
    }
  }
  const campaign=new Date().toLocaleDateString('vi-VN',{month:'2-digit',year:'numeric'});
  const {error}=await sb.from('customers').insert({
    business_name:document.getElementById('a-biz')&&document.getElementById('a-biz').value||null,
    customer_name:name,
    business_phone:bphone||null,
    cellphone:cell||null,
    state:document.getElementById('a-state')&&document.getElementById('a-state').value||null,
    zipcode:document.getElementById('a-zip')&&document.getElementById('a-zip').value||null,
    potential:document.getElementById('a-pot')&&document.getElementById('a-pot').value||null,
    status:document.getElementById('a-status')&&document.getElementById('a-status').value||'New',
    sub_status:document.getElementById('a-substatus')&&document.getElementById('a-substatus').value||null,
    brand:document.getElementById('a-brand')&&document.getElementById('a-brand').value||null,
    description:document.getElementById('a-desc')&&document.getElementById('a-desc').value||null,
    assigned_to:document.getElementById('a-sale')&&document.getElementById('a-sale').value||currentUser.id,
    created_by:currentUser.id,
    campaign_month:campaign,
    approval_status:isDup?'pending':'approved',
    is_duplicate:isDup,
  });
  if(error){showLoading(false);alert('Lỗi: '+error.message);return;}
  await loadCustomers();
  document.getElementById('add-modal')&&document.getElementById('add-modal').remove();
  addOpen=false;showLoading(false);render();
  if(isDup)alert('Khách đã được thêm vào danh sách chờ duyệt. Manager sẽ xem xét và phê duyệt.');
}

// ============================================================
// APPROVE / RECALL / DELETE
// ============================================================
async function approveCustomer(id,status){
  showLoading(true);
  const update={approval_status:status};
  if(status==='rejected'){update.assigned_to=null;}
  if(status==='approved'){
    const {data:c}=await sb.from('customers').select('created_by').eq('id',id).single();
    if(c&&c.created_by)update.assigned_to=c.created_by;
  }
  await sb.from('customers').update(update).eq('id',id);
  await loadCustomers();showLoading(false);render();
}

async function doRecall(){
  if(!confirm('Thu hồi tất cả khách hết deadline và chưa có Potential?'))return;
  showLoading(true);
  const now=new Date();
  const today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const {data:expired,error}=await sb.from('customers').select('id,potential,lead_status,assigned_deadline').lte('assigned_deadline',today);
  if(error){showLoading(false);alert('Lỗi: '+error.message);return;}
  const toRecall=(expired||[]).filter(function(c){return (!c.potential||c.potential==='')&&c.lead_status!=='Closedeal';});
  if(toRecall.length===0){showLoading(false);alert('Không có khách nào hết hạn cần thu hồi!');return;}
  const ids=toRecall.map(function(c){return c.id;});
  await sb.from('customers').update({assigned_to:null,is_recalled:true,assigned_deadline:null}).in('id',ids);
  const toKeep=(expired||[]).filter(function(c){return c.potential&&c.potential!=='';});
  if(toKeep.length>0)await sb.from('customers').update({assigned_deadline:null}).in('id',toKeep.map(function(c){return c.id;}));
  await loadCustomers();showLoading(false);render();
  alert('Thu hồi hoàn tất! Đã thu hồi '+toRecall.length+' khách.');
}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  const m=document.getElementById('main-area');
  if(!m)return;
  if(page==='customers')m.innerHTML=renderCustomers();
  else if(page==='potential')m.innerHTML=renderPotential();
  else if(page==='closedeal')m.innerHTML=renderClosedeal();
  else if(page==='pipeline')m.innerHTML=renderPipeline();
  else if(page==='pending')m.innerHTML=renderPending();
  else if(page==='kpi')m.innerHTML=renderKPI();
  else if(page==='campaign')m.innerHTML=renderCampaign();
  else if(page==='alert')m.innerHTML=renderAlert();
  else if(page==='products')m.innerHTML=renderProducts();
  if(selId&&!document.getElementById('detail-modal'))renderDetailModal(selId);
  if(addOpen&&!document.getElementById('add-modal'))renderAddModal();
}

// BOOT
(async function(){
  const {data:{session}}=await sb.auth.getSession();
  if(session&&session.user)await initApp(session.user);
})();
