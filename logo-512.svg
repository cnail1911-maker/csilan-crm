<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1240"/>
      <stop offset="100%" style="stop-color:#0d0820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeaa7"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="rgba(162,155,254,0.06)" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="rgba(162,155,254,0.06)" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="rgba(162,155,254,0.06)" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="rgba(162,155,254,0.06)" stroke-width="1"/>

  <!-- C arc shape - bold geometric C -->
  <path d="M 310 145 
             A 130 130 0 1 0 310 367" 
        fill="none" 
        stroke="url(#accent)" 
        stroke-width="44" 
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Inner C accent line -->
  <path d="M 298 178 
             A 90 90 0 1 0 298 334" 
        fill="none" 
        stroke="rgba(162,155,254,0.25)" 
        stroke-width="2" 
        stroke-linecap="round"/>

  <!-- S letterform - stylized as bar chart bars -->
  <rect x="318" y="210" width="36" height="92" rx="8" fill="url(#accent)" opacity="0.9"/>
  <rect x="362" y="240" width="36" height="62" rx="8" fill="url(#accent)" opacity="0.7"/>
  <rect x="406" y="268" width="36" height="34" rx="8" fill="url(#accent)" opacity="0.5"/>

  <!-- Connecting line for S bars -->
  <path d="M 336 210 Q 380 200 424 268" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Dot accent -->
  <circle cx="420" cy="180" r="8" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Bottom text -->
  <text x="256" y="430" 
        font-family="Georgia, serif" 
        font-size="42" 
        font-weight="700" 
        fill="white" 
        text-anchor="middle" 
        letter-spacing="8">SILAN</text>
  <text x="256" y="462" 
        font-family="Georgia, serif" 
        font-size="16" 
        fill="rgba(162,155,254,0.7)" 
        text-anchor="middle" 
        letter-spacing="6">C R M</text>
</svg>
